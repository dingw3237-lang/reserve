<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DW 预约系统</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <!-- Loading Screen -->
    <div class="loading-screen" id="loadingScreen">
        <div class="loading-spinner"></div>
        <div class="loading-text">正在加载预约数据...</div>
    </div>

    <!-- Toast Container -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- Header -->
    <header class="header" id="mainHeader">
        <div class="header-left">
            <div class="logo">DW</div>
            <div>
                <div class="header-title">DW 预约系统</div>
                <div class="header-subtitle">在线预约 · 轻松便捷</div>
            </div>
        </div>
        <button class="admin-trigger" onclick="openAdminLogin()" title="管理员入口">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
            </svg>
            <span>管理</span>
        </button>
    </header>

    <!-- Main Content -->
    <main class="main-content" id="mainContent">
        <div class="month-nav">
            <div>
                <div class="month-label" id="monthLabel"></div>
                <div class="month-range" id="monthRange"></div>
            </div>
            <div class="legend">
                <div class="legend-item">
                    <div class="legend-dot today"></div>
                    <span>今天</span>
                </div>
                <div class="legend-item">
                    <div class="legend-dot available"></div>
                    <span>全部可用</span>
                </div>
                <div class="legend-item">
                    <div class="legend-dot occupied"></div>
                    <span>部分/已满</span>
                </div>
            </div>
        </div>
        <div class="calendar-grid" id="calendarGrid"></div>
    </main>

    <!-- Booking Modal -->
    <div class="modal-overlay" id="bookModal">
        <div class="modal">
            <div class="modal-header">
                <h3>预约确认</h3>
                <p id="bookSlotInfo"></p>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label class="form-label" for="bookName">姓名</label>
                    <input class="form-input" type="text" id="bookName" placeholder="请输入您的姓名" maxlength="20" autocomplete="name">
                    <div class="form-error" id="nameError">请输入姓名</div>
                </div>
                <div class="form-group">
                    <label class="form-label" for="bookReason">预约事由</label>
                    <input class="form-input" type="text" id="bookReason" placeholder="请输入预约事由" maxlength="50">
                    <div class="form-error" id="reasonError">请输入预约事由</div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeBookModal()">取消</button>
                <button class="btn btn-primary" id="submitBtn" onclick="submitBooking()">确认预约</button>
            </div>
        </div>
    </div>

    <!-- Admin Login Modal -->
    <div class="modal-overlay" id="loginModal">
        <div class="modal">
            <div class="modal-header">
                <h3>管理员验证</h3>
                <p>请输入管理员密码以进入后台</p>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label class="form-label" for="adminPwd">密码</label>
                    <input class="form-input" type="password" id="adminPwd" placeholder="请输入管理员密码" autocomplete="current-password">
                    <div class="form-error" id="pwdError">密码错误，请重试</div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeLoginModal()">取消</button>
                <button class="btn btn-primary" onclick="verifyAdmin()">验证</button>
            </div>
        </div>
    </div>

    <!-- Confirm Dialog -->
    <div class="confirm-overlay" id="confirmOverlay">
        <div class="confirm-dialog">
            <h4 id="confirmTitle">确认删除</h4>
            <p id="confirmMessage">确定要删除这条预约记录吗？此操作不可撤销。</p>
            <div class="confirm-buttons">
                <button class="btn btn-secondary" onclick="closeConfirm()">取消</button>
                <button class="btn btn-danger" id="confirmAction">删除</button>
            </div>
        </div>
    </div>

    <!-- Date Detail Modal (replaces inline expansion) -->
    <div class="modal-overlay" id="dateDetailModal">
        <div class="modal date-detail-modal">
            <div class="modal-header">
                <h3 id="dateDetailTitle">5月12日</h3>
                <p id="dateDetailSubtitle">周二</p>
            </div>
            <div class="modal-body">
                <div class="day-slots-grid" id="dateDetailSlots"></div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeDateDetailModal()">关闭</button>
            </div>
        </div>
    </div>

    <!-- Admin Page -->
    <div class="admin-page" id="adminPage">
        <div class="admin-header">
            <div class="admin-title">预约管理</div>
            <button class="btn btn-secondary" onclick="backToHome()" style="flex:none;">← 返回首页</button>
        </div>
        <div class="admin-stats" id="adminStats"></div>
        <div class="admin-list" id="adminList"></div>
    </div>

    <!-- Scripts: config must load before app -->
    <script src="js/config.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
